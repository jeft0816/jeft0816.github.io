name: CI & Deploy Nuxt (FTP)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-build:
    name: Quality & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test --run

      - name: Generate static site
        run: pnpm generate
        env:
          NUXT_SPOTIFY_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          NUXT_SPOTIFY_CLIENT_SECRET: ${{ secrets.CLIENT_SECRETS }}
          NUXT_SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}

      - name: Upload static artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuxt-static-site
          path: .output/public
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to FTP
    needs: quality-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production
    permissions:
      contents: read

    steps:
      - name: Download static artifact
        uses: actions/download-artifact@v4
        with:
          name: nuxt-static-site
          path: ./public

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./public/
          server-dir: ${{ secrets.FTP_PATH }}
          log-level: minimal
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**


